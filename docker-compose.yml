version: "3.9"
services:
  app:
    build: .
    ports: ["8080:8080"]
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MQTT_BROKER_URL: tcp://mosquitto:1883
    depends_on: [postgres, redis, mosquitto]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hgn_sos
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
