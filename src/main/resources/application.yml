spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID}

sos:
  dedup-ttl-seconds: ${DEDUP_TTL_SECONDS}
  escalation-window-seconds: ${ESCALATION_WINDOW_SECONDS}
  escalation-poll-ms: ${ESCALATION_POLL_MS}
  resolution-grace-days: ${RESOLUTION_GRACE_DAYS}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
