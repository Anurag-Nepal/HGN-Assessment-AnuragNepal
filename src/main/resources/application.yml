spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/hgn_sos
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: hgn-sos-backend

sos:
  dedup-ttl-seconds: ${DEDUP_TTL_SECONDS:60}
  escalation-window-seconds: ${ESCALATION_WINDOW_SECONDS:300}
  escalation-poll-ms: 30000
  resolution-grace-days: 1